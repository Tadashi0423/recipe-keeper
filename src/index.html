<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Keeper</title>
  </head>

  <body>
    <header>
      <h1>Recipe Keeper</h1>
      <div class="header-actions">
        <button id="add-recipe-btn">+ Add Recipe</button>
      </div>
    </header>

    <main>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search recipes...">
        <button id="search-btn">Search</button>
      </div>

      <div id="recipe-grid" class="recipe-grid">
        <!-- Recipe cards will be inserted here -->
      </div>
    </main>

    <!-- Add/Edit Recipe Modal -->
    <div id="recipe-modal" class="modal">
      <div class="modal-content">
        <span class="close">x</span>
        <h2 id="modal-title">Add Recipe</h2>
        <form id="recipe-form">
          <input type="hidden" id="recipe-id">

          <label for="title">Title *</label>
          <input type="text" id="title" required>

          <label for="url">URL</label>
          <input type="text" id="url">

          <label for="cuisine">Cuisine</label>
          <input type="text" id="cuisine">

          <label for="cooking_time">Cooking Time (minutes)</label>
          <input type="number" id="cooking_time">

          <label for="servings">Servings</label>
          <input type="number" id="servings">

          <label for="ingredients">Ingredients (comma separated)</label>
          <input type="text" id="ingredients" placeholder="chicken, rice, soy sauce,...">

          <label for="instructions">Instructions</label>
          <textarea id="instructions" rows="4"></textarea>

          <button type="submit" class="btn-primary">Save Recipe</button>
        </form>
      </div>
    </div>

    <script src="main.js" defer></script>
  </body>
</html>
